version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: internal/auth/queries.sql
    gen:
      go:
        package: auth
        out: internal/auth
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type: time.Time
  - engine: postgresql
    schema: db/migrations
    queries: internal/progress/queries.sql
    gen:
      go:
        package: progress
        out: internal/progress
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type: time.Time
