services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: do_indeksa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d do_indeksa"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
