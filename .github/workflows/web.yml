name: web

on:
  pull_request:
    paths: ["apps/web/**", "content/**", ".github/workflows/web.yml"]
  push:
    branches: [main]
    paths: ["apps/web/**", "content/**", ".github/workflows/web.yml"]

defaults:
  run:
    working-directory: apps/web

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx prettier --check src
      - run: npm run lint
      - run: npm test
      - run: npm run build
